  <link rel="stylesheet" href="css/style.css" />
</head>

        <span class="brand-mark" aria-hidden="true"><i class="fa-solid fa-code"></i></span>
        <span class="brand-text">Mugisho</span>
      </a>

      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-controls="primary-nav" aria-expanded="false">
        <span class="nav-toggle-lines" aria-hidden="true"></span>
      </button>

      <nav id="primary-nav" class="primary-nav" aria-label="Primary">
        <a class="nav-link" href="index.html" data-page="home">Home</a>
        <a class="nav-link" href="about.html" data-page="about">About</a>

        <a class="nav-link" href="certificates.html" data-page="certificates">Certificates</a>
        <a class="nav-link" href="contact.html" data-page="contact">Contact</a>
      </nav>

      <div class="header-actions" aria-label="Theme and utilities">
        <button class="theme-toggle" type="button" aria-label="Toggle dark/light mode">
          <i class="fa-solid fa-moon" aria-hidden="true" data-icon="moon"></i>
          <i class="fa-solid fa-sun" aria-hidden="true" data-icon="sun"></i>
        </button>
      </div>
    </div>
  </header>

  <main id="main">
    <section class="section" aria-labelledby="contact-title">
      <div class="container contact-grid">
        <div class="contact-left">
          <div class="section-head reveal">
            <h1 id="contact-title" data-i18n="nav.contact">Contact</h1>
            <p data-i18n="home.contactMe">Contact Me</p>
          </div>


          <form id="contact-form" class="card contact-card reveal" novalidate>
            <div class="form-grid">
              <div class="field">
                <label for="fullName" data-i18n="fullName">Full Name</label>
                <input id="fullName" name="fullName" type="text" autocomplete="name" required minlength="2" />
                <div class="field-error" id="err-fullName" role="alert" aria-live="polite"></div>
              </div>


              <div class="field">
                <label for="email" data-i18n="email">Email Address</label>
                <input id="email" name="email" type="email" autocomplete="email" required />
                <div class="field-error" id="err-email" role="alert" aria-live="polite"></div>
              </div>


              <div class="field">
                <label for="subject" data-i18n="subject">Subject</label>
                <input id="subject" name="subject" type="text" required minlength="3" />
                <div class="field-error" id="err-subject" role="alert" aria-live="polite"></div>
              </div>

              <div class="field field-full">
                <label for="message" data-i18n="message">Message</label>
                <textarea id="message" name="message" rows="5" required minlength="10"></textarea>
                <div class="field-error" id="err-message" role="alert" aria-live="polite"></div>
              </div>

              <div class="field field-full">
                <button class="btn btn-primary" type="submit" data-i18n="sendMessage">
                  <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
                  Send Message
                </button>
              </div>


            </div>
          </form>

          <div id="form-toast" class="toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>
        </div>

        <aside class="contact-right" aria-label="Contact details">
          <section class="card reveal">
            <h2 class="h3" data-i18n="location">Location</h2>
            <div class="meta-row"><i class="fa-solid fa-location-dot" aria-hidden="true"></i><span>Mbarara, Uganda</span></div>

            <div class="meta-row"><i class="fa-regular fa-envelope" aria-hidden="true"></i><span>mugishomunganga1@gmail.com</span></div>
          </section>

          <section class="card reveal">
            <h2 class="h3" data-i18n="socialLinks">Social Links</h2>
            <div class="social-stack">
              <a class="social-chip" href="https://www.linkedin.com/in/mugisho-munganga-7a2748298?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" target="_blank" rel="noopener"><i class="fa-brands fa-linkedin" aria-hidden="true"></i> LinkedIn</a>
              <a class="social-chip" href="https://github.com/mugisho259" target="_blank" rel="noopener"><i class="fa-brands fa-github" aria-hidden="true"></i> GitHub</a>
              <a class="social-chip" href="mailto:mugishomunganga1@gmail.com"><i class="fa-regular fa-envelope" aria-hidden="true"></i> Email</a>
            </div>
          </section>


         
        </aside>
      </div>
    </section>
  </main>

        <p class="footer-brand">Built by Mugisho Munganga </p>
        
      </div>

          <a href="projects.html" data-i18n="nav.projects">Projects</a>
          <a href="services.html" data-i18n="nav.services">Services</a>
          <a href="certificates.html" data-i18n="nav.certificates">Certificates</a>
          <a href="contact.html" data-i18n="nav.contact">Contact</a>
        </div>
      </div>

      <div>
        <p class="footer-title" data-i18n="footer.letsConnect">Let's Connect</p>
        <div class="social-row">

          <a class="social-link" href="https://www.linkedin.com/in/mugisho-munganga-7a2748298?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" aria-label="LinkedIn"><i class="fa-brands fa-linkedin" aria-hidden="true"></i></a>
          <a class="social-link" href="https://github.com/mugisho259" aria-label="GitHub"><i class="fa-brands fa-github" aria-hidden="true"></i></a>
          <a class="social-link" href="mailto:mugishomunganga1@gmail.com" aria-label="Email" data-i18n="nav.contact"><i class="fa-regular fa-envelope" aria-hidden="true"></i></a>

          <a class="social-link" href="https://wa.me/256772211512" aria-label="WhatsApp DM" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp" aria-hidden="true"></i></a>

        </div>
      </div>
    </div>

    <button class="back-to-top" type="button" aria-label="Back to top">
      <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
    </button>
  </footer>

  <script src="js/i18n.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
